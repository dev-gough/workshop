<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Game of Life">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.10"/>
      <stop offset="0.4" stop-color="#0a0a0d" stop-opacity="1"/>
      <stop offset="1" stop-color="#0a0a0d" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="200" height="240" rx="8" ry="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="199" height="239" rx="7.5" ry="7.5" fill="none" stroke="#4ade80" stroke-opacity="0.55" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.55;0.95;0.55" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- atomic number -->
  <text x="14" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#4ade80" fill-opacity="0.65">02</text>
  <!-- category small caps in upper right -->
  <text x="186" y="26" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.4" fill="#4ade80" fill-opacity="0.55">AUTOMATON</text>

  <!-- glow halo behind symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#4ade80" fill-opacity="0.20" filter="url(#glow)">Gl</text>
  <!-- big symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#4ade80">Gl</text>

  <!-- name -->
  <text x="100" y="158" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fafafa" fill-opacity="0.92">Game of Life</text>

  <!-- glyph -->
  <g transform="translate(70,196)" stroke="#4ade80" stroke-opacity="0.55" fill="none" stroke-width="1">
        <rect width="60" height="30"/>
        <line x1="20" y1="0" x2="20" y2="30"/><line x1="40" y1="0" x2="40" y2="30"/>
        <line x1="0" y1="10" x2="60" y2="10"/><line x1="0" y1="20" x2="60" y2="20"/>
        <rect x="2" y="12" width="6" height="6" fill="#4ade80" stroke="none"/>
        <rect x="22" y="22" width="6" height="6" fill="#4ade80" stroke="none"/>
        <rect x="42" y="2"  width="6" height="6" fill="#4ade80" stroke="none"/>
        <rect x="42" y="12" width="6" height="6" fill="#4ade80" stroke="none"/>
        <rect x="22" y="2"  width="6" height="6" fill="#4ade80" stroke="none"/>
      </g>

  <!-- bottom rule -->
  <line x1="20" y1="218" x2="180" y2="218" stroke="#4ade80" stroke-opacity="0.25" stroke-width="0.6"/>
  <text x="100" y="232" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" letter-spacing="2" fill="#4ade80" fill-opacity="0.45">/gol</text>
</svg>
