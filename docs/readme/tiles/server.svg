<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Server Status">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.10"/>
      <stop offset="0.4" stop-color="#0a0a0d" stop-opacity="1"/>
      <stop offset="1" stop-color="#0a0a0d" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="200" height="240" rx="8" ry="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="199" height="239" rx="7.5" ry="7.5" fill="none" stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.55;0.95;0.55" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- atomic number -->
  <text x="14" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#2dd4bf" fill-opacity="0.65">13</text>
  <!-- category small caps in upper right -->
  <text x="186" y="26" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.4" fill="#2dd4bf" fill-opacity="0.55">INFRA</text>

  <!-- glow halo behind symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#2dd4bf" fill-opacity="0.20" filter="url(#glow)">Sv</text>
  <!-- big symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#2dd4bf">Sv</text>

  <!-- name -->
  <text x="100" y="158" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fafafa" fill-opacity="0.92">Server Status</text>

  <!-- glyph -->
  <g transform="translate(72,196)" stroke="#2dd4bf" fill="none" stroke-width="1">
        <rect width="56" height="10"/>
        <rect y="13" width="56" height="10"/>
        <rect y="26" width="56" height="10"/>
        <circle cx="6" cy="5" r="1.6" fill="#2dd4bf"/>
        <circle cx="6" cy="18" r="1.6" fill="#2dd4bf"/>
        <circle cx="6" cy="31" r="1.6" fill="#2dd4bf" fill-opacity="0.4"/>
      </g>

  <!-- bottom rule -->
  <line x1="20" y1="218" x2="180" y2="218" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="0.6"/>
  <text x="100" y="232" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" letter-spacing="2" fill="#2dd4bf" fill-opacity="0.45">/server</text>
</svg>
