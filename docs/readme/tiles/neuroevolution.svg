<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Neuroevolution">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.10"/>
      <stop offset="0.4" stop-color="#0a0a0d" stop-opacity="1"/>
      <stop offset="1" stop-color="#0a0a0d" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="200" height="240" rx="8" ry="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="199" height="239" rx="7.5" ry="7.5" fill="none" stroke="#60a5fa" stroke-opacity="0.55" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.55;0.95;0.55" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- atomic number -->
  <text x="14" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#60a5fa" fill-opacity="0.65">04</text>
  <!-- category small caps in upper right -->
  <text x="186" y="26" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.4" fill="#60a5fa" fill-opacity="0.55">SIMULATION</text>

  <!-- glow halo behind symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#60a5fa" fill-opacity="0.20" filter="url(#glow)">Nv</text>
  <!-- big symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#60a5fa">Nv</text>

  <!-- name -->
  <text x="100" y="158" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fafafa" fill-opacity="0.92">Neuroevolution</text>

  <!-- glyph -->
  <g transform="translate(60,196)" fill="#60a5fa" stroke="#60a5fa" stroke-opacity="0.45" stroke-width="0.7">
        <line x1="6" y1="6" x2="40" y2="2"/><line x1="6" y1="6" x2="40" y2="12"/><line x1="6" y1="6" x2="40" y2="22"/><line x1="6" y1="6" x2="40" y2="32"/>
        <line x1="6" y1="18" x2="40" y2="2"/><line x1="6" y1="18" x2="40" y2="12"/><line x1="6" y1="18" x2="40" y2="22"/><line x1="6" y1="18" x2="40" y2="32"/>
        <line x1="6" y1="30" x2="40" y2="2"/><line x1="6" y1="30" x2="40" y2="12"/><line x1="6" y1="30" x2="40" y2="22"/><line x1="6" y1="30" x2="40" y2="32"/>
        <line x1="40" y1="2" x2="74" y2="12"/><line x1="40" y1="2" x2="74" y2="24"/>
        <line x1="40" y1="12" x2="74" y2="12"/><line x1="40" y1="12" x2="74" y2="24"/>
        <line x1="40" y1="22" x2="74" y2="12"/><line x1="40" y1="22" x2="74" y2="24"/>
        <line x1="40" y1="32" x2="74" y2="12"/><line x1="40" y1="32" x2="74" y2="24"/>
        <circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="6" cy="30" r="2.4"/>
        <circle cx="40" cy="2" r="2.4"/><circle cx="40" cy="12" r="2.4"/><circle cx="40" cy="22" r="2.4"/><circle cx="40" cy="32" r="2.4"/>
        <circle cx="74" cy="12" r="2.4"/><circle cx="74" cy="24" r="2.4"/>
      </g>

  <!-- bottom rule -->
  <line x1="20" y1="218" x2="180" y2="218" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="0.6"/>
  <text x="100" y="232" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" letter-spacing="2" fill="#60a5fa" fill-opacity="0.45">/neuroevolution</text>
</svg>
