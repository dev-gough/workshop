<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="LoL Challenges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.10"/>
      <stop offset="0.4" stop-color="#0a0a0d" stop-opacity="1"/>
      <stop offset="1" stop-color="#0a0a0d" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="200" height="240" rx="8" ry="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="199" height="239" rx="7.5" ry="7.5" fill="none" stroke="#fbbf24" stroke-opacity="0.55" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.55;0.95;0.55" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- atomic number -->
  <text x="14" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#fbbf24" fill-opacity="0.65">08</text>
  <!-- category small caps in upper right -->
  <text x="186" y="26" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1.4" fill="#fbbf24" fill-opacity="0.55">TRACKER</text>

  <!-- glow halo behind symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#fbbf24" fill-opacity="0.20" filter="url(#glow)">Lc</text>
  <!-- big symbol -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="78" font-weight="800" fill="#fbbf24">Lc</text>

  <!-- name -->
  <text x="100" y="158" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fafafa" fill-opacity="0.92">LoL Challenges</text>

  <!-- glyph -->
  <g transform="translate(86,196)" fill="none" stroke="#fbbf24">
        <path d="M -16 30 L 0 18 L 16 30" stroke-width="2"/>
        <path d="M -16 22 L 0 10 L 16 22" stroke-width="1.6" stroke-opacity="0.7"/>
        <path d="M -16 14 L 0 2 L 16 14" stroke-width="1.4" stroke-opacity="0.5"/>
      </g>

  <!-- bottom rule -->
  <line x1="20" y1="218" x2="180" y2="218" stroke="#fbbf24" stroke-opacity="0.25" stroke-width="0.6"/>
  <text x="100" y="232" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" letter-spacing="2" fill="#fbbf24" fill-opacity="0.45">/challenges</text>
</svg>
